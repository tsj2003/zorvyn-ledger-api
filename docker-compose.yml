services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
      POSTGRES_DB: finance_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://finance_user:finance_pass@db:5432/finance_db
      JWT_SECRET: super-secret-change-in-production
      JWT_EXPIRY_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
