databases:
  - name: zorvyn-db
    plan: free
    databaseName: finance_db
    user: finance_user

services:
  - type: web
    name: zorvyn-ledger-api
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zorvyn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_MINUTES
        value: 60
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL_INTERNAL
        fromDatabase:
          name: zorvyn-db
          property: host
        # Note: After first deploy, wait 2-3 minutes then run seed manually in Render Shell
